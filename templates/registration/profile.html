{% extends "base.html" %}
{% block title %}My Profile - Django Shop{% endblock %}

{% block content %}
<div class="auth-form">
    <h1>My Profile</h1>
    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock %}
